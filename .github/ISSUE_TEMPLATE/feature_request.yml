name: Feature Request
description: Suggest a new feature or improvement for excalidraw-export-mcp
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea so we can evaluate and discuss it.

  - type: textarea
    id: problem-statement
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Is this related to a frustration with the current behavior?
      placeholder: I'm always frustrated when ...
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see.
      placeholder: Describe how the feature should work.
    validations:
      required: true

  - type: textarea
    id: alternatives-considered
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?
      placeholder: Describe any alternatives you've thought about.
    validations:
      required: false

  - type: dropdown
    id: export-format
    attributes:
      label: Related Export Format
      description: Does this feature relate to a specific export format?
      options:
        - PNG
        - JPG
        - SVG
        - All formats
        - Not format-specific
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context, mockups, or references for the feature request.
    validations:
      required: false
